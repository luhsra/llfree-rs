[alias]
perf = ["run", "-pllfree-eval", "-r", "--bin"]
perf-build = ["build", "-pllfree-eval", "-r", "--bin"]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "target-cpu=skylake", "-C", "force-frame-pointers=yes"]

[target.x86_64-unknown-none]
rustflags = ["-C", "target-cpu=skylake"]
